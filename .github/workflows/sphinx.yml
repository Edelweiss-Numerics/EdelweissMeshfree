name: Documentation

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Mambaforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          use-mamba: true
          miniforge-variant: Miniforge3
          miniforge-version: latest
          activate-environment: anaconda-client-env

      - name: Install conda packages
        shell: bash -l {0}
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          BASE="${{ github.base_ref }}"

          URL="https://github.com/Edelweiss-Numerics/EdelweissFE.git"
          if git ls-remote --exit-code --heads "$URL" "$BRANCH" > /dev/null 2>&1; then
            echo "Cloning EdelweissFE branch: $BRANCH"
            git clone --branch "$BRANCH" "$URL"
          elif [ -n "$BASE" ] && git ls-remote --exit-code --heads "$URL" "$BASE" > /dev/null 2>&1; then
            echo "::warning title=EdelweissFE Branch Fallback::Branch '$BRANCH' not found. Falling back to PR base branch '$BASE'."
            git clone --branch "$BASE" "$URL"
          else
            echo "::warning title=EdelweissFE Branch Fallback::Neither branch '$BRANCH' nor base '$BASE' found. Falling back to default branch."
            git clone "$URL"
          fi

          mamba install --file EdelweissFE/conda_requirements.txt

      - name: Install Eigen
        shell: bash -l {0}
        run: |
          git clone --branch 3.4.0 https://gitlab.com/libeigen/eigen.git
          cd eigen
          mkdir build
          cd build
          cmake -DBUILD_TESTING=OFF -DCMAKE_INSTALL_PREFIX=$CONDA_PREFIX -DINCLUDE_INSTALL_DIR=$CONDA_PREFIX/include ..
          make install
          cd ../..

      - name: Install Autodiff
        shell: bash -l {0}
        run: |
          git clone --branch v1.1.0 https://github.com/autodiff/autodiff.git
          cd autodiff
          mkdir build
          cd build
          cmake -DAUTODIFF_BUILD_TESTS=OFF -DAUTODIFF_BUILD_PYTHON=OFF -DAUTODIFF_BUILD_EXAMPLES=OFF -DAUTODIFF_BUILD_DOCS=OFF -DCMAKE_INSTALL_PREFIX=$CONDA_PREFIX ..
          make install
          cd ../..

      - name: Install Fastor
        shell: bash -l {0}
        run: |
          git clone https://github.com/romeric/Fastor.git
          cd Fastor
          cmake -DBUILD_TESTING=OFF -DCMAKE_INSTALL_PREFIX=$CONDA_PREFIX .
          make install
          cd ..

      - name: Install Marmot
        shell: bash -l {0}
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          BASE="${{ github.base_ref }}"

          # Helper function for mandatory modules ($2 = optional target dir)
          clone_mandatory() {
            local url=$1
            local dir=$2
            if git ls-remote --exit-code --heads "$url" "$BRANCH" > /dev/null 2>&1; then
              git clone --branch "$BRANCH" "$url" $dir
            elif [ -n "$BASE" ] && git ls-remote --exit-code --heads "$url" "$BASE" > /dev/null 2>&1; then
              echo "::warning title=Marmot Branch Fallback::Branch '$BRANCH' not found in $url. Falling back to PR base branch '$BASE'."
              git clone --branch "$BASE" "$url" $dir
            else
              echo "::warning title=Marmot Branch Fallback::Neither branch '$BRANCH' nor base '$BASE' found in $url. Falling back to default branch."
              git clone "$url" $dir
            fi
          }

          clone_mandatory "https://github.com/MAteRialMOdelingToolbox/Marmot.git"
          clone_mandatory "https://github.com/BOKU-CMP-MEC-MAT/MarmotMeshfreeCore.git" ./Marmot/modules/core/MarmotMeshfreeCore
          mkdir ./Marmot/build
          cd ./Marmot/build
          cmake -DCMAKE_INSTALL_PREFIX=$CONDA_PREFIX ..
          make install
          cd ../..

      - name: Install EdelweissFE
        shell: bash -l {0}
        run: |
          cd EdelweissFE
          pip install .
          cd ..

      - name: Build EdelweissMeshfree
        shell: bash -l {0}
        run: |
          pip install .

      - name: Build Sphinx documentation
        shell: bash -l {0}
        run: |
          sphinx-build ./doc/source/ ./docs -b html

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
