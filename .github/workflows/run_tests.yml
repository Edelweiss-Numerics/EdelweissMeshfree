name: Run tests

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      edelweissfe_branch:
        description: "Branch to use for EdelweissFE (leave empty to auto-detect)"
        required: false
        default: ""
      marmot_branch:
        description: "Branch to use for Marmot and all Marmot modules (leave empty to auto-detect)"
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Setup Mambaforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          use-mamba: true
          miniforge-variant: Miniforge3
          miniforge-version: latest
          activate-environment: anaconda-client-env

      - name: Install conda packages
        shell: bash -l {0}
        run: |
          BRANCH="${{ inputs.edelweissfe_branch || github.head_ref || github.ref_name }}"
          git clone --branch "$BRANCH" https://github.com/Edelweiss-Numerics/EdelweissFE.git 2>/dev/null \
            || { echo "Branch '$BRANCH' not found in EdelweissFE, falling back to default branch."; git clone https://github.com/Edelweiss-Numerics/EdelweissFE.git; }
          mamba install --file EdelweissFE/requirements.txt

      - name: Install Eigen
        shell: bash -l {0}
        run: |
          git clone --branch 3.4.0 https://gitlab.com/libeigen/eigen.git
          cd eigen
          mkdir build
          cd build
          cmake -DBUILD_TESTING=OFF -DCMAKE_INSTALL_PREFIX=$CONDA_PREFIX -DINCLUDE_INSTALL_DIR=$CONDA_PREFIX/include ..
          make install
          cd ../..

      - name: Install Autodiff
        shell: bash -l {0}
        run: |
          git clone --branch v1.1.0 https://github.com/autodiff/autodiff.git
          cd autodiff
          mkdir build
          cd build
          cmake -DAUTODIFF_BUILD_TESTS=OFF -DAUTODIFF_BUILD_PYTHON=OFF -DAUTODIFF_BUILD_EXAMPLES=OFF -DAUTODIFF_BUILD_DOCS=OFF ..
          make install
          cd ../..

      - name: Install Fastor
        shell: bash -l {0}
        run: |
          git clone https://github.com/romeric/Fastor.git
          cd Fastor
          cmake -DBUILD_TESTING=OFF -DCMAKE_INSTALL_PREFIX=$CONDA_PREFIX .
          make install
          cd ..

      - name: Install Marmot
        shell: bash -l {0}
        run: |
          BRANCH="${{ inputs.marmot_branch || github.head_ref || github.ref_name }}"
          git clone --branch "$BRANCH" https://github.com/MAteRialMOdelingToolbox/Marmot.git 2>/dev/null \
            || { echo "Branch '$BRANCH' not found in Marmot, falling back to default branch."; git clone https://github.com/MAteRialMOdelingToolbox/Marmot.git; }
          git clone --branch "$BRANCH" "https://github.com/BOKU-CMP-MEC-MAT/MarmotMeshfreeCore.git" ./Marmot/modules/core/MarmotMeshfreeCore 2>/dev/null \
            || { echo "Branch '$BRANCH' not found in MarmotMeshfreeCore, falling back to default branch."; git clone "https://github.com/BOKU-CMP-MEC-MAT/MarmotMeshfreeCore.git" ./Marmot/modules/core/MarmotMeshfreeCore; }
          if git clone --branch "$BRANCH" "https://github.com/BOKU-CMP-MEC-MAT/DisplacementParticle.git" ./Marmot/modules/particles/DisplacementParticle 2>/dev/null \
               || git clone "https://github.com/BOKU-CMP-MEC-MAT/DisplacementParticle.git" ./Marmot/modules/particles/DisplacementParticle 2>/dev/null; then
            echo "DisplacementParticle module installed."
          else
            echo "DisplacementParticle not available, skipping."
          fi
          if git clone --branch "$BRANCH" "https://github.com/BOKU-CMP-MEC-MAT/DisplacementMaterialPoint.git" ./Marmot/modules/materialpoints/DisplacementMaterialPoint 2>/dev/null \
               || git clone "https://github.com/BOKU-CMP-MEC-MAT/DisplacementMaterialPoint.git" ./Marmot/modules/materialpoints/DisplacementMaterialPoint 2>/dev/null; then
            echo "DisplacementMaterialPoint module installed."
          else
            echo "DisplacementMaterialPoint not available, skipping."
          fi
          mkdir ./Marmot/build
          cd ./Marmot/build
          cmake -DCMAKE_INSTALL_PREFIX=$CONDA_PREFIX  ..
          make install
          cd ../..

      - name: Install EdelweissFE
        shell: bash -l {0}
        run: |
          cd EdelweissFE
          pip install .
          cd ..

      - name: Build EdelweissMeshfree
        shell: bash -l {0}
        run: |
          pip install .

      - name: Run tests
        shell: bash -l {0}
        run: |
          pytest .
